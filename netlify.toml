[build]
  publish = "web"
  # Sin comando de build: el sitio es HTML/CSS estático puro

[build.environment]
  NODE_VERSION = "18"

# Cabeceras de seguridad para todas las páginas
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache largo para assets estáticos
[[headers]]
  for = "/favicon.*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/estilos.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Redirección www → raíz (Netlify gestiona esto automáticamente
# al añadir el dominio personalizado, pero lo dejamos explícito)
[[redirects]]
  from = "https://www.vigex.es/*"
  to   = "https://vigex.es/:splat"
  status = 301
  force  = true
