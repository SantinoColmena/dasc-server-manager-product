<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - DASC Central Support</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f6f8fa;
            color: #06162f;
            margin: 0;
        }

        .wrapper {
            max-width: 460px;
            margin: 90px auto;
            padding: 0 20px;
        }

        .card {
            background: #fff;
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 18px 38px rgba(15, 23, 42, .08);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 28px;
        }

        p {
            margin-top: 0;
            color: #526176;
        }

        label {
            display: block;
            font-weight: bold;
            margin-top: 14px;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccd6e0;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 15px;
        }

        button {
            width: 100%;
            margin-top: 18px;
            padding: 12px 16px;
            border: 0;
            border-radius: 10px;
            background: #2563eb;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
        }

        .alert {
            background: #fff7ed;
            border: 1px solid #fed7aa;
            color: #9a3412;
            border-radius: 10px;
            padding: 10px 12px;
            margin: 14px 0;
        }

        .hint {
            font-size: 13px;
            color: #64748b;
            margin-top: 14px;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="card">
            <h1>DASC Central Support</h1>
            <p>Acceso reservado al equipo tecnico DASC.</p>

            {% if msg %}
                <div class="alert">{{ msg }}</div>
            {% endif %}

            <form method="post" action="/login">
                <label for="username">Usuario</label>
                <input id="username" name="username" type="text" autocomplete="username" required>

                <label for="password">Contrasena</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required>

                <button type="submit">Entrar</button>
            </form>

            <div class="hint">
                Usuarios de laboratorio por defecto: admin/admin o tecnico/tecnico.
                En producto real deben cambiarse mediante variables de entorno.
            </div>
        </div>
    </div>
</body>
</html>
