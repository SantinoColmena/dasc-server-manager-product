<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t('lgn.page_title') }} — Vigex</title>
    <link rel="icon" href="/static/img/logo-vigex.svg" type="image/svg+xml">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0b2e 0%, #1e1b4b 50%, #312e81 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        .login-shell {
            width: 100%;
            max-width: 420px;
        }

        .login-brand {
            text-align: center;
            margin-bottom: 28px;
        }

        .login-brand img {
            height: 52px;
            margin-bottom: 14px;
            filter: drop-shadow(0 4px 12px rgba(99,102,241,0.4));
        }

        .login-brand h1 {
            font-size: 26px;
            font-weight: 800;
            color: white;
            letter-spacing: -0.3px;
        }

        .login-brand p {
            font-size: 14px;
            color: rgba(196, 181, 253, 0.75);
            margin-top: 4px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 20px;
            padding: 32px 28px;
        }

        .login-alert {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 13px 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.35);
            color: #fca5a5;
        }

        .login-alert.blocked {
            background: rgba(245, 158, 11, 0.12);
            border-color: rgba(245, 158, 11, 0.30);
            color: #fde68a;
        }

        .field-group {
            margin-bottom: 18px;
        }

        .field-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: rgba(196, 181, 253, 0.85);
            margin-bottom: 7px;
        }

        .field-group .input-wrap {
            position: relative;
        }

        .field-group .input-icon {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(165, 180, 252, 0.5);
            font-size: 14px;
            pointer-events: none;
        }

        .field-group input {
            width: 100%;
            padding: 12px 14px 12px 38px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.06);
            color: white;
            font-family: inherit;
            font-size: 15px;
            outline: none;
            transition: border-color 0.15s ease, background 0.15s ease;
        }

        .field-group input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .field-group input:focus {
            border-color: rgba(99, 102, 241, 0.7);
            background: rgba(99, 102, 241, 0.08);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 13px;
            background: #4f46e5;
            color: white;
            font-family: inherit;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s ease, transform 0.12s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
        }

        .btn-login:hover {
            background: #4338ca;
            transform: translateY(-1px);
        }

        .login-footer {
            text-align: center;
            margin-top: 22px;
            font-size: 12px;
            color: rgba(196, 181, 253, 0.4);
        }

        .lang-switcher {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 14px;
        }
        .lang-switcher a {
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 99px;
            text-decoration: none;
            color: rgba(196, 181, 253, 0.55);
            border: 1px solid rgba(196, 181, 253, 0.2);
            transition: color .15s, border-color .15s;
        }
        .lang-switcher a.active, .lang-switcher a:hover {
            color: rgba(196, 181, 253, 0.9);
            border-color: rgba(196, 181, 253, 0.5);
        }
    </style>
</head>
<body>

<div class="login-shell">

    <div class="login-brand">
        <img src="/static/img/logo-vigex.svg" alt="Vigex" style="height:64px;width:auto;border-radius:18px;">
        <h1>Vigex</h1>
        <p>{{ t('lgn.subtitle') }}</p>
    </div>

    <div class="login-card">

        {% if error == "2" %}
        <div class="login-alert blocked">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <div>
                <strong>{{ t('lgn.error_blocked_title') }}</strong><br>
                {{ t('lgn.error_blocked_msg') }}
            </div>
        </div>
        {% elif error %}
        <div class="login-alert">
            <i class="fa-solid fa-circle-xmark"></i>
            <div>{{ t('lgn.error_creds') }}</div>
        </div>
        {% endif %}

        <form method="post" action="/login" autocomplete="off">

            <div class="field-group">
                <label for="username">{{ t('lgn.lbl_username') }}</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-user input-icon"></i>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="{{ t('lgn.ph_username') }}"
                        required
                        autofocus
                        autocomplete="username"
                    >
                </div>
            </div>

            <div class="field-group">
                <label for="password">{{ t('lgn.lbl_password') }}</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="{{ t('lgn.ph_password') }}"
                        required
                        autocomplete="current-password"
                    >
                </div>
            </div>

            <button type="submit" class="btn-login">
                <i class="fa-solid fa-right-to-bracket"></i>
                {{ t('lgn.btn_enter') }}
            </button>

        </form>
    </div>

    <div class="lang-switcher">
        <a href="/set-lang?lang=es&next=/login" class="{% if lang == 'es' %}active{% endif %}">ES</a>
        <a href="/set-lang?lang=ca&next=/login" class="{% if lang == 'ca' %}active{% endif %}">CA</a>
    </div>

    <div class="login-footer">
        {{ t('lgn.footer') }}
    </div>

</div>

</body>
</html>
